            config/scripts/ssh-relay-runtime-manifest-signing-handoff.test.mjs `
            config/scripts/ssh-relay-runtime-closure.test.mjs `
            config/scripts/ssh-relay-runtime-pty-smoke.test.mjs `
            config/scripts/ssh-relay-runtime-reproducibility.test.mjs `
            config/scripts/ssh-relay-runtime-resource-diagnostics.test.mjs `
            config/scripts/ssh-relay-runtime-provenance.test.mjs `
            config/scripts/ssh-relay-runtime-sbom.test.mjs `
            config/scripts/ssh-relay-runtime-toolchain.test.mjs `
            config/scripts/ssh-relay-runtime-windows-pe-diagnostic.test.mjs `
            config/scripts/ssh-relay-runtime-windows-tree.test.mjs `
            config/scripts/ssh-relay-runtime-zip.test.mjs `
            config/scripts/ssh-relay-runtime-workflow.test.mjs
          if ($LASTEXITCODE -ne 0) { throw 'runtime artifact contract tests failed' }

      - name: Download exact Node release inputs
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $inputs = Join-Path $env:RUNNER_TEMP 'node-release-inputs'
          New-Item -ItemType Directory -Path $inputs | Out-Null
          $base = 'https://nodejs.org/dist/v24.18.0'
          $assets = @(
            'SHASUMS256.txt',
            'SHASUMS256.txt.sig',
            '${{ matrix.node_archive }}',
            'node-v24.18.0-headers.tar.gz',
            '${{ matrix.node_library }}'
          )
          foreach ($asset in $assets) {
            $destination = Join-Path $inputs $asset
            New-Item -ItemType Directory -Path (Split-Path -Parent $destination) -Force | Out-Null
            & curl.exe --fail --silent --show-error --location --proto '=https' --tlsv1.2 `
              --connect-timeout 20 --max-time 300 --retry 2 --retry-delay 2 --retry-all-errors `
              "$base/$asset" --output $destination
            if ($LASTEXITCODE -ne 0) { throw "Node input download failed: $asset" }
          }
          "NODE_INPUTS=$inputs" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build twice, inspect, smoke, and compare exact runtime
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $outputRoot = Join-Path $env:RUNNER_TEMP 'ssh-relay-runtime/${{ matrix.tuple }}'
          New-Item -ItemType Directory -Path $outputRoot -Force | Out-Null
          $firstOutput = Join-Path $outputRoot 'first'
          $secondOutput = Join-Path $outputRoot 'second'
          $workDirectory = Join-Path $env:RUNNER_TEMP 'orca-ssh-relay-runtime-build-work'
          $sourceCommit = git rev-parse HEAD
          $sourceDateEpoch = git show -s --format=%ct $sourceCommit
          foreach ($output in @($firstOutput, $secondOutput)) {
            "clean_build_output=$output"
            node config/scripts/build-ssh-relay-runtime.mjs `
              --tuple '${{ matrix.tuple }}' `
              --inputs-directory $env:NODE_INPUTS `
              --output-directory $output `
              --work-directory $workDirectory `
              --source-date-epoch $sourceDateEpoch `
              --git-commit $sourceCommit
            if ($LASTEXITCODE -ne 0) { throw 'runtime build failed' }
            $identity = Join-Path $output 'orca-ssh-relay-runtime-${{ matrix.tuple }}.identity.json'
            $archive = Get-ChildItem -LiteralPath $output -Filter '*.zip' -File | Select-Object -First 1
            if (-not $archive) { throw 'runtime ZIP is missing' }
            node config/scripts/verify-ssh-relay-runtime.mjs `
              --runtime-directory (Join-Path $output 'runtime') `
              --identity $identity `
              --archive $archive.FullName
            if ($LASTEXITCODE -ne 0) { throw 'runtime verification failed' }
            $prohibited = Get-ChildItem -LiteralPath (Join-Path $output 'runtime') -Recurse -File |
              Where-Object { $_.Name -in @('npm', 'npm.cmd', 'npx', 'npx.cmd', 'corepack', 'corepack.cmd') -or $_.Name.EndsWith('.map') } |
              Select-Object -First 1
            if ($prohibited) { throw "Runtime contains a prohibited file: $($prohibited.FullName)" }
            $parcelRoot = Join-Path $output 'runtime/node_modules/@parcel'
            if (@(Get-ChildItem -LiteralPath $parcelRoot -Directory).Count -ne 2) {
              throw 'Runtime must contain exactly the watcher wrapper and one native package'
            }
          }
          node config/scripts/ssh-relay-runtime-reproducibility.mjs `
            --tuple '${{ matrix.tuple }}' `
            --first-output-directory $firstOutput `
            --second-output-directory $secondOutput
          if ($LASTEXITCODE -ne 0) {
            $firstPe = Join-Path $firstOutput 'runtime/node_modules/node-pty/build/Release/conpty_console_list.node'
            $secondPe = Join-Path $secondOutput 'runtime/node_modules/node-pty/build/Release/conpty_console_list.node'
            if ((Test-Path -LiteralPath $firstPe -PathType Leaf) -and (Test-Path -LiteralPath $secondPe -PathType Leaf)) {
              # Why: rejected PE bytes remain local, but bounded headers/ranges identify the producer drift.
              node config/scripts/ssh-relay-runtime-windows-pe-diagnostic.mjs `
                --first-pe $firstPe `
                --second-pe $secondPe
              if ($LASTEXITCODE -ne 0) { Write-Output 'windows_pe_diagnostic=failed' }
              if ('${{ matrix.tuple }}' -eq 'win32-arm64') {
                $llvmObjdump = Get-Command llvm-objdump.exe -ErrorAction SilentlyContinue
                if ($llvmObjdump) {
                  foreach ($candidate in @(
                    @{ Label = 'first'; Path = $firstPe },
                    @{ Label = 'second'; Path = $secondPe }
                  )) {
                    "windows_arm64_disassembly=$($candidate.Label)"
                    # Why: the first 512 code bytes classify the repeated instruction without retaining rejected files.
                    & $llvmObjdump.Source --disassemble --start-address=0x180001000 --stop-address=0x180001200 $candidate.Path
                    if ($LASTEXITCODE -ne 0) { Write-Output 'windows_arm64_disassembly=failed' }
                  }
                } else {
                  Write-Output 'windows_arm64_disassembly=tool-unavailable'
                }
              }
            } else {
              Write-Output 'windows_pe_diagnostic=skipped_missing_input'
            }
            throw 'runtime reproducibility verification failed'
          }
          $signingStage = Join-Path $outputRoot 'signing-stage'
          $signingReport = Join-Path $outputRoot 'orca-ssh-relay-runtime-${{ matrix.tuple }}.signing-stage.json'
          $reportLines = & node config/scripts/ssh-relay-runtime-native-signing-stage.mjs `
            --identity (Join-Path $firstOutput 'orca-ssh-relay-runtime-${{ matrix.tuple }}.identity.json') `
            --runtime-directory (Join-Path $firstOutput 'runtime') `
            --staging-directory $signingStage
          if ($LASTEXITCODE -ne 0) { throw 'runtime native signing assessment/staging failed' }
          $reportJson = $reportLines -join [Environment]::NewLine
          $report = $reportJson | ConvertFrom-Json
          if (
            $report.platform -ne 'win32' -or
            @($report.assessments).Count -ne 5 -or
            @($report.signingFiles).Count -ne 3 -or
            @($report.preservedUpstreamFiles).Count -ne 2 -or
            -not $report.payload.stagingRequired -or
            @($report.payload.stagedFiles).Count -ne 3
          ) {
            throw 'Windows signing-stage report violates the Authenticode contract'
          }
          $preservedPaths = @($report.preservedUpstreamFiles | ForEach-Object { $_.path })
          foreach ($path in @(
            'node_modules/node-pty/build/Release/conpty/OpenConsole.exe',
            'node_modules/node-pty/build/Release/conpty/conpty.dll'
          )) {
            if ($path -notin $preservedPaths) { throw "Required upstream signature was not preserved: $path" }
          }
          if (@(Get-ChildItem -LiteralPath $signingStage -Recurse -File).Count -ne 3) {
            throw 'Windows signing stage must contain exactly three unsigned PE files'
          }
          if (Test-Path -LiteralPath (Join-Path $signingStage 'bin/node.exe')) {
            throw 'Official Node must never enter the Windows signing stage'
          }
          [System.IO.File]::WriteAllText(
            $signingReport,
            "$reportJson`n",
            [System.Text.UTF8Encoding]::new($false)
          )
          $reportJson
          $sourceSignatureReport = Join-Path $outputRoot 'orca-ssh-relay-runtime-${{ matrix.tuple }}.source-signatures.json'
          $sourceSignatureLines = & node config/scripts/ssh-relay-runtime-windows-source-signature-verification.mjs `
            --identity (Join-Path $firstOutput 'orca-ssh-relay-runtime-${{ matrix.tuple }}.identity.json') `
            --runtime-directory (Join-Path $firstOutput 'runtime') `
            --signing-report $signingReport
          if ($LASTEXITCODE -ne 0) { throw 'runtime Windows source signature verification failed' }
          $sourceSignatureJson = $sourceSignatureLines -join [Environment]::NewLine
          $sourceSignature = $sourceSignatureJson | ConvertFrom-Json
          if (
            $sourceSignature.tupleId -ne '${{ matrix.tuple }}' -or
            @($sourceSignature.verifiedFiles).Count -ne 3 -or
            @($sourceSignature.verifiedFiles | Where-Object { $_.signerKind -eq 'official-node' }).Count -ne 1 -or
            @($sourceSignature.verifiedFiles | Where-Object { $_.signerKind -eq 'preserved-upstream' }).Count -ne 2
          ) {
            throw 'Windows source signature report violates the immutable/preserved trust contract'
          }
          [System.IO.File]::WriteAllText(
            $sourceSignatureReport,
            "$sourceSignatureJson`n",
            [System.Text.UTF8Encoding]::new($false)
          )
          $sourceSignatureJson
          Remove-Item -LiteralPath $signingStage -Recurse -Force
          $evidence = Join-Path $env:GITHUB_WORKSPACE 'runtime-evidence/${{ matrix.tuple }}'
          New-Item -ItemType Directory -Path $evidence -Force | Out-Null
          $firstArchive = Get-ChildItem -LiteralPath $firstOutput -Filter '*.zip' -File | Select-Object -First 1
          Copy-Item -LiteralPath $firstArchive.FullName -Destination $evidence
          Get-ChildItem -LiteralPath $firstOutput -File |
            Where-Object { $_.Name -match '\.(?:spdx|provenance|identity)\.json$' } |
            Copy-Item -Destination $evidence
          Copy-Item -LiteralPath $signingReport -Destination $evidence
          Copy-Item -LiteralPath $sourceSignatureReport -Destination $evidence

      - name: Upload unpublished artifact evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ssh-relay-runtime-${{ matrix.tuple }}
          path: runtime-evidence/${{ matrix.tuple }}/
          if-no-files-found: error
          retention-days: 7

  verify-linux-runtime-baseline-userland:
    name: Supplement ${{ matrix.tuple }} oldest userland (kernel gap remains)
    needs: build-posix-runtime
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            tuple: linux-x64-glibc
            container_image: docker.io/library/rockylinux@sha256:2d05a9266523bbf24f33ebc3a9832e4d5fd74b973c220f2204ca802286aa275d
          - runner: ubuntu-24.04-arm
            tuple: linux-arm64-glibc
            container_image: docker.io/library/rockylinux@sha256:3c2d0ce12bf79fc5ff05e43b1000e30ff062dc89405525f3307cbff71661f1a0
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    env:
      ORCA_RUNTIME_REQUESTED_RUNNER: ${{ matrix.runner }}

    steps:
      - name: Checkout exact source revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          run_install: false

      - name: Setup Node 24.18.0
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Record supplemental baseline runner identity
        shell: bash
        run: |
          set -euo pipefail
          printf 'requested_runner=%s\n' "$ORCA_RUNTIME_REQUESTED_RUNNER"
          printf 'resolved_image_os=%s\n' "${ImageOS:-unknown}"
          printf 'resolved_image_version=%s\n' "${ImageVersion:-unknown}"
          printf 'runner_arch=%s\n' "$RUNNER_ARCH"
          uname -a

      - name: Install verification dependencies without native postinstall
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile --ignore-scripts
          git diff --exit-code package.json pnpm-lock.yaml

      - name: Download exact unpublished runtime evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ssh-relay-runtime-${{ matrix.tuple }}
          path: runtime-evidence/${{ matrix.tuple }}

      - name: Verify bytes before supplemental baseline execution
        shell: bash
        run: |
          set -euo pipefail
          evidence="$GITHUB_WORKSPACE/runtime-evidence/${{ matrix.tuple }}"
          mapfile -d '' identities < <(find "$evidence" -maxdepth 1 -type f -name '*.identity.json' -print0)
          mapfile -d '' archives < <(find "$evidence" -maxdepth 1 -type f -name '*.tar.xz' -print0)
          if (( ${#identities[@]} != 1 || ${#archives[@]} != 1 )); then
            printf 'runtime baseline evidence is ambiguous: identities=%s archives=%s\n' \
              "${#identities[@]}" "${#archives[@]}" >&2
            exit 1
          fi
          identity=${identities[0]}
          archive=${archives[0]}
          runtime="$RUNNER_TEMP/baseline-runtime/${{ matrix.tuple }}"
          mkdir -p "$runtime"
          tar -xJf "$archive" -C "$runtime"
          node config/scripts/verify-ssh-relay-runtime.mjs \
            --runtime-directory "$runtime" \
            --identity "$identity" \
            --archive "$archive"
          printf 'BASELINE_RUNTIME=%s\n' "$runtime" >> "$GITHUB_ENV"

      - name: Prove oldest Linux userland and retain the kernel gap
        shell: bash
        run: |
          set -euo pipefail
          image='${{ matrix.container_image }}'
          docker pull "$image"
          docker image inspect "$image" --format 'container_image={{index .RepoDigests 0}}'
          docker run --rm --network none --read-only --cap-drop all \
            --security-opt no-new-privileges --pids-limit 128 --memory 1g --cpus 2 \
            --tmpfs /tmp:rw,nosuid,size=64m \
            --mount "type=bind,src=$GITHUB_WORKSPACE,dst=/workspace,readonly" \
            --mount "type=bind,src=$BASELINE_RUNTIME,dst=/runtime,readonly" \
            --workdir /workspace \
            "$image" \
            /runtime/bin/node config/scripts/ssh-relay-runtime-smoke-child.cjs /runtime
          # Why: the container proves glibc/libstdc++ floors but shares the newer hosted kernel.
          docker run --rm --network none --read-only --cap-drop all \
            --security-opt no-new-privileges --pids-limit 128 --memory 1g --cpus 2 \
            --tmpfs /tmp:rw,nosuid,size=64m \
            --mount "type=bind,src=$GITHUB_WORKSPACE,dst=/workspace,readonly" \
            --mount "type=bind,src=$BASELINE_RUNTIME,dst=/runtime,readonly" \
            --workdir /workspace \
            "$image" \
            /runtime/bin/node config/scripts/ssh-relay-runtime-baseline.mjs \
              --tuple '${{ matrix.tuple }}' \
              --scope linux-userland \
              --runtime-directory /runtime

  verify-windows-runtime-baseline:
    name: Verify ${{ matrix.tuple }} oldest Windows baseline
    needs: build-windows-runtime
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2022
            tuple: win32-x64
          - runner: windows-11-arm
            tuple: win32-arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    env:
      ORCA_RUNTIME_REQUESTED_RUNNER: ${{ matrix.runner }}

    steps:
      - name: Checkout exact source revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          run_install: false

      - name: Setup Node 24.18.0
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Record oldest-baseline runner identity
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          "requested_runner=$env:ORCA_RUNTIME_REQUESTED_RUNNER"
          "resolved_image_os=$env:ImageOS"
          "resolved_image_version=$env:ImageVersion"
          "runner_arch=$env:RUNNER_ARCH"
          Get-ComputerInfo | Select-Object WindowsProductName, WindowsVersion, OsBuildNumber

      - name: Install verification dependencies without native postinstall
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          pnpm install --frozen-lockfile --ignore-scripts
          if ($LASTEXITCODE -ne 0) { throw 'pnpm install failed' }
          git diff --exit-code package.json pnpm-lock.yaml
          if ($LASTEXITCODE -ne 0) { throw 'frozen install changed dependency files' }

      - name: Download exact unpublished runtime evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ssh-relay-runtime-${{ matrix.tuple }}
          path: runtime-evidence/${{ matrix.tuple }}

      - name: Verify bytes and execute on the declared Windows floor
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $evidence = Join-Path $env:GITHUB_WORKSPACE 'runtime-evidence/${{ matrix.tuple }}'
          $identities = @(Get-ChildItem -LiteralPath $evidence -Filter '*.identity.json' -File)
          $archives = @(Get-ChildItem -LiteralPath $evidence -Filter '*.zip' -File)
          if ($identities.Count -ne 1 -or $archives.Count -ne 1) {
            throw "runtime baseline evidence is ambiguous: identities=$($identities.Count) archives=$($archives.Count)"
          }
          $identity = $identities[0]
          $archive = $archives[0]
          $runtime = Join-Path $env:RUNNER_TEMP 'baseline-runtime/${{ matrix.tuple }}'
          Expand-Archive -LiteralPath $archive.FullName -DestinationPath $runtime
          node config/scripts/verify-ssh-relay-runtime.mjs `
            --runtime-directory $runtime `
            --identity $identity.FullName `
            --archive $archive.FullName
          if ($LASTEXITCODE -ne 0) { throw 'runtime baseline verification failed' }
          node config/scripts/ssh-relay-runtime-baseline.mjs `
            --tuple '${{ matrix.tuple }}' `
            --scope full
          if ($LASTEXITCODE -ne 0) { throw 'runner does not prove the declared Windows floor' }
